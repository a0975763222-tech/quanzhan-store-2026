    // ==========================================
    // 共用輔助函式 (Hoisted Functions 解決 ReferenceError)
    // ==========================================
    function checkIsNew(launchStr) {
      if(!launchStr) return false;
      const match = launchStr.match(/(\d{4})年(\d{2})月/);
      if (!match) return false;
      const launchYear = parseInt(match[1], 10);
      const launchMonth = parseInt(match[2], 10);
      const launchDate = new Date(launchYear, launchMonth - 1, 1);
      const currentDate = new Date(); 
      const diffMonths = (currentDate.getFullYear() - launchDate.getFullYear()) * 12 + (currentDate.getMonth() - launchDate.getMonth());
      return diffMonths >= -3 && diffMonths <= 3;
    }

    function getDeviceTemplate(name) {
      if (!name) return 'iphone-std';
      const lowerName = name.toLowerCase();
      if (lowerName.includes('ultra')) return 'samsung-ultra';
      if (lowerName.includes('samsung') || lowerName.includes('galaxy') || lowerName.includes('s2')) return 'samsung-std';
      if (lowerName.includes('pro') || lowerName.includes('max')) return 'iphone-pro';
      return 'iphone-std';
    }

    function getBrandTheme(brand) {
      switch(brand) {
          case 'Apple': return { bg: '#121619', text: '#FFFFFF', frame: 'rgba(255,255,255,0.15)', bgText: 'rgba(255,255,255,0.03)' };
          case 'Samsung': return { bg: '#034EA2', text: '#FFFFFF', frame: 'rgba(255,255,255,0.15)', bgText: 'rgba(255,255,255,0.05)' };
          case 'OPPO': return { bg: '#009A65', text: '#FFFFFF', frame: 'rgba(255,255,255,0.15)', bgText: 'rgba(255,255,255,0.05)' };
          case 'vivo': return { bg: '#415FFF', text: '#FFFFFF', frame: 'rgba(255,255,255,0.15)', bgText: 'rgba(255,255,255,0.05)' };
          case '小米': return { bg: '#E65100', text: '#FFFFFF', frame: 'rgba(255,255,255,0.2)', bgText: 'rgba(255,255,255,0.08)' }; 
          default: return { bg: '#1E293B', text: '#FFFFFF', frame: 'rgba(255,255,255,0.15)', bgText: 'rgba(255,255,255,0.03)' };
      }
    }

    // ==========================================
    // ✨ 核心升級：自動將 8+128GB=20000 加上錢字號與千分位
    // ==========================================
    function formatCombinedPrice(str) {
      if (!str) return '';
      let pStr = String(str).trim();
      if (!pStr.includes('=')) return pStr; 

      let parts = pStr.split('=');
      let mem = parts[0].trim();
      let pricePart = parts[1].replace(/元/g, '').replace(/\$/g, '').replace(/,/g, '').trim();
      
      let isQi = pricePart.endsWith('起');
      if (isQi) pricePart = pricePart.slice(0, -1);

      let numericPrice = Number(pricePart);
      let formattedPrice = isNaN(numericPrice) ? pricePart : numericPrice.toLocaleString();

      return `${mem} = $${formattedPrice}元${isQi ? '起' : ''}`;
    }

    // ==========================================
    // 3. 視覺組件設計 (Hoisted Functions)
    // ==========================================
    function RealTimeStatus() {
      const [time, setTime] = useState(new Date());
      useEffect(() => {
        const timer = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);
      
      const y = time.getFullYear();
      const m = String(time.getMonth() + 1).padStart(2, '0');
      const d = String(time.getDate()).padStart(2, '0');
      const h = String(time.getHours()).padStart(2, '0');
      const min = String(time.getMinutes()).padStart(2, '0');
      const s = String(time.getSeconds()).padStart(2, '0');

      return (
        <div className="flex items-center gap-2 text-[10px] md:text-xs font-bold bg-black/20 px-3 py-1.5 rounded-full border border-white/20 shadow-inner text-white backdrop-blur-md">
          <span className="relative flex h-2 w-2 md:h-3 md:w-3">
            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span className="relative inline-flex rounded-full h-2 w-2 md:h-3 md:w-3 bg-green-500"></span>
          </span>
          <span className="font-mono tracking-widest">{`${y}-${m}-${d} ${h}:${min}:${s}`}</span>
          <span className="hidden md:inline ml-1 text-green-300">系統連線中</span>
        </div>
      );
    }

      const isPro = t.includes('pro') || t.includes('ultra') || t.includes('max');

      return (

    function DynamicFlagshipCard({ product }) {
      const bgText = (product.title || "PRO").toUpperCase();
      
      return (
        <div className="w-full h-full bg-white relative overflow-hidden flex flex-col rounded-xl shadow-inner border border-slate-200">

                   className="font-black text-slate-50 tracking-tighter transform -rotate-12 opacity-80 select-none text-center whitespace-nowrap"
                   style={{ fontSize: bgText.length > 10 ? '70px' : '90px' }}
                >
                    {bgText}

            </div>

    // ==========================================
    // 主應用程式 App 組件
    // ==========================================
    function App() {
      const [systemView, setSystemView] = useState('frontend'); 
      const [backendCategory, setBackendCategory] = useState('Apple');
      const [toast, setToast] = useState({ show: false, msg: '', type: 'info' });

      // 後台狀態
      const [user, setUser] = useState(null);
      const [officialImg, setOfficialImg] = useState(null);
      const [brandLogoImgs, setBrandLogoImgs] = useState({ apple: null, samsung: null, quanzhan: null });
      const [modelName, setModelName] = useState('');
      const [deviceColor, setDeviceColor] = useState('');
      
      // 後台規格狀態
      const [inputBrand, setInputBrand] = useState('Apple');
      const [inputSalePrice, setInputSalePrice] = useState('');
      const [inputRearCam, setInputRearCam] = useState('');
      const [inputFrontCam, setInputFrontCam] = useState('');
      const [inputBattery, setInputBattery] = useState('');
      const [inputMaterial, setInputMaterial] = useState('');
      const [inputSize, setInputSize] = useState(''); 
      const [inputPS, setInputPS] = useState(''); 
      const [isAnalyzing, setIsAnalyzing] = useState(false);

      const [hiddenStaticProducts, setHiddenStaticProducts] = useState([]);
      const [websiteProducts, setWebsiteProducts] = useState([]);
      const [isUploading, setIsUploading] = useState(false);
      const canvas1Ref = useRef(null);
      const canvas2Ref = useRef(null);

      // 前台狀態
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [activeCategory, setActiveCategory] = useState('New'); 
      const [frontendActiveView, setFrontendActiveView] = useState('商品明細列表'); 

      const showToast = (msg, type = 'info') => {
        setToast({ show: true, msg, type });
        setTimeout(() => setToast({ show: false, msg: '', type: 'info' }), 4000);
      };

      // 💡 小幫手修復：在這裡補上了下載 Canvas 圖片的處理函數
      const downloadCanvas = (canvasRef, filename) => {
        if (!canvasRef.current) return;
        const link = document.createElement('a');
        link.download = filename;
        link.href = canvasRef.current.toDataURL('image/jpeg', 0.9);
        link.click();
      };

      useEffect(() => {
        if (!auth) {
            const loadLogos = () => {
                const apple = new Image(); apple.src = LOGO_ASSETS.apple;
                const samsung = new Image(); samsung.src = LOGO_ASSETS.samsung;
                const quanzhan = new Image(); quanzhan.src = LOGO_ASSETS.quanzhan;
                quanzhan.onload = () => setBrandLogoImgs({ apple, samsung, quanzhan });
            }
            loadLogos();
            return;
        }
        
        const initAuth = async () => {
          try {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await signInWithCustomToken(auth, window.__initial_auth_token);
            } else if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth error:", err);
          }
        };
        initAuth();
        
        const unsubscribeAuth = onAuthStateChanged(auth, setUser);

        const loadLogos = () => {
            const apple = new Image(); apple.src = LOGO_ASSETS.apple;
            const samsung = new Image(); samsung.src = LOGO_ASSETS.samsung;
            const quanzhan = new Image(); quanzhan.src = LOGO_ASSETS.quanzhan;
            quanzhan.onload = () => setBrandLogoImgs({ apple, samsung, quanzhan });
        }
        loadLogos();

        return () => unsubscribeAuth && unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        const appIdStr = typeof appId === 'string' ? appId : 'quanzhan-gen-v1';
        try {
          const q = collection(db, 'artifacts', appIdStr, 'public', 'data', 'website_products');
          const unsubscribe = onSnapshot(q, (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setWebsiteProducts(data.sort((a, b) => b.createdAt - a.createdAt)); 
          }, (error) => {
            console.error("Firestore onSnapshot error:", error);
          });
          return () => unsubscribe();
        } catch (e) {
          console.error("Error setting up Firestore listener", e);
        }
      }, [user, db, appId]);

      // ==========================================
      // 後台邏輯
      // ==========================================
      const loadProductToForm = (item) => {
        setModelName(item.title || item.model || '');
        setInputBrand(item.brand || 'Apple');
        setDeviceColor(item.specs?.['機身顏色'] || item.color || '');
        setInputRearCam(item.specs?.['後鏡頭'] || '');
        setInputFrontCam(item.specs?.['前鏡頭'] || '');
        setInputSalePrice(item.specs?.['銓展價'] || '');
        setInputMaterial(item.specs?.['材質'] || '');
        setInputSize(item.specs?.['商品尺寸'] || ''); 
        setInputBattery(item.specs?.['電池容量'] || '');
        setInputPS(item.specs?.['PS (附註)'] || item.specs?.['PS (備註)'] || ''); 
        
        showToast(`已成功載入「${item.title || item.model}」規格，請上傳照片並點擊發布。`, "success");
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleDocUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsAnalyzing(true);
        showToast("系統 AI 分析文件規格中...", "info");

        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          
          setTimeout(() => {
            const lines = text.split('\n');
            lines.forEach(line => {
              const l = line.toLowerCase().replace(/\s/g, '');
              if (l.includes('品牌:')) setInputBrand(line.split(':')[1]?.trim() || 'Apple');
              if (l.includes('型號:')) setModelName(line.split(':')[1]?.trim() || '');
              if (l.includes('顏色:')) setDeviceColor(line.split(':')[1]?.trim() || '');
              if (l.includes('後鏡頭:')) setInputRearCam(line.split(':')[1]?.trim() || '');
              if (l.includes('前鏡頭:')) setInputFrontCam(line.split(':')[1]?.trim() || '');
              if (l.includes('電池:')) setInputBattery(line.split(':')[1]?.trim() || '');
              if (l.includes('材質:')) setInputMaterial(line.split(':')[1]?.trim() || '');
              if (l.includes('尺寸:')) setInputSize(line.split(':')[1]?.trim() || ''); 
              if (l.includes('破盤:') || l.includes('銓展價:')) setInputSalePrice(line.split(':')[1]?.trim() || '');
              if (l.includes('備註:') || l.includes('附註:') || l.includes('ps:')) setInputPS(line.split(':')[1]?.trim() || '');
            });
            setIsAnalyzing(false);
            showToast("✅ 解析成功！型號、顏色與規格已自動填入。", "success");
          }, 1500);
        };
        reader.readAsText(file);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                setOfficialImg(img);
                showToast("圖片上傳成功！展示圖與藍圖已自動生成。", "success");
            };
            img.src = event.target.result;
          };
          reader.readAsDataURL(file);
        }
      };

      const handleClearForm = () => {
        setOfficialImg(null);
        setModelName('');
        setDeviceColor('');
        setInputBrand('Apple');
        setInputSalePrice('');
        setInputRearCam('');
        setInputFrontCam('');
        setInputBattery('');
        setInputMaterial('');
        setInputSize('');
        setInputPS('');
        showToast("表單已清空，準備新增下一筆商品。", "info");
      };

      const handleSaveToDatabase = async () => {
        if (!officialImg || !modelName) {
          showToast("⚠️ 請先上傳照片並輸入型號，系統才能分析產圖！", "error");
          return;
        }
        setIsUploading(true);
        try {
          const detailListImgUrl = canvas1Ref.current.toDataURL('image/jpeg', 0.85);
          const lensListImgUrl = canvas2Ref.current.toDataURL('image/jpeg', 0.85); 
          
          if(!db || !user) {
             showToast("🚀 [展示模式] 存檔成功！商品已自動上架至前台展示區。", "success");
             setIsUploading(false);
             return;
          }
          
          const appIdStr = typeof appId === 'string' ? appId : 'quanzhan-gen-v1';
          await addDoc(collection(db, 'artifacts', appIdStr, 'public', 'data', 'website_products'), {
            model: modelName,
            color: deviceColor,
            brand: inputBrand,
            specs: {
              "商品尺寸": inputSize || "依原廠公告",
              "材質": inputMaterial || "依原廠公告",
              "後鏡頭": inputRearCam || "依原廠公告",
              "前鏡頭": inputFrontCam || "依原廠公告",
              "電池容量": inputBattery || "依原廠公告",
              "銓展價": inputSalePrice || "專屬破盤價",
              "機身顏色": deviceColor || "標準色",
              "PS (附註)": inputPS || " "
            },
            detailListImage: detailListImgUrl,
            lensListImage: lensListImgUrl,
            imageFormat: '600x600_optimized_jpg',
            createdAt: Date.now()
          });
          showToast("🚀 存檔成功！商品已自動上架至前台展示區。", "success");
          handleClearForm(); 
        } catch (e) {
          showToast("上傳失敗，請確認權限或網路狀態。", "error");
          console.error(e);
        }
        setIsUploading(false);
      };

      const deleteEntry = async (id) => {
        if (!db || !user) {
             showToast("展示模式無法刪除雲端資料。", "error");
             return;
        }
        try {
          const appIdStr = typeof appId === 'string' ? appId : 'quanzhan-gen-v1';
          await deleteDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', 'website_products', id));
          showToast("商品已從網站下架。", "success");
        } catch(e) {
          showToast("下架失敗，權限不足或網路錯誤。", "error");
        }
      };

      // ==========================================
      // 前台邏輯
      // ==========================================
      const getFilteredProducts = () => {
        const backendItems = websiteProducts.map(wp => {
            let specs = { ...wp.specs };
            
            // 💡 小幫手修復：加強切割防呆功能，避免資料缺少導致畫面死當
            if (specs['官方售價']) delete specs['官方售價'];
            if (specs['記憶體與容量'] && specs['銓展價'] && !String(specs['銓展價']).includes('=')) {
                const mems = String(specs['記憶體與容量']).split(' / ');
                const sPrices = String(specs['銓展價']).split(' / ');
                specs['銓展價'] = mems.map((m, i) => `${m}=${sPrices[i] || '破盤價'}${sPrices[i] && !String(sPrices[i]).includes('元') && !String(sPrices[i]).includes('起') ? '元' : ''}`).join(' / ');
                delete specs['記憶體與容量'];
            }
            if (specs['PS (備註)']) {
                specs['PS (附註)'] = specs['PS (備註)'];
                delete specs['PS (備註)'];
            }
            
            return {
                id: wp.id,
                brand: wp.brand || (wp.model ? wp.model.split(' ')[0] : "最新上架"),
                type: "phone",
                title: wp.model || "未命名商品",
                launch: "上市時間：2026年03月", 
                features: ["全新上架旗艦機種", "請洽詢門市最新優惠", "銓展通訊專屬保證"],
                annotations: blankAnnotations,
                specs: specs || { 
                  "商品尺寸": "依原廠公告", 
                  "材質": "依原廠公告", 
                  "後鏡頭": "依原廠公告", 
                  "前鏡頭": "依原廠公告", 
                  "電池容量": "依原廠公告", 
                  "銓展價": "專屬破盤價", 
                  "機身顏色": wp.color || "標準色",
                  "PS (附註)": " "
                },
                isFromBackend: true,
                lensListImage: wp.lensListImage,      
                detailListImage: wp.detailListImage,  
                imageUrl: wp.detailListImage 
            };
        });

        const staticItems = frontendProducts.map(p => ({
            ...p,
            isStatic: true,
            originalId: p.id
        }));

        const all = [...backendItems, ...staticItems].map(p => ({
          ...p,
          isNew: p.isFromBackend || checkIsNew(p.launch)
        }));

        if (activeCategory === 'New') return all.filter(p => p.isNew);
        return all.filter(p => {
          if (activeCategory === '平板') return p.type === 'tablet';
          if (activeCategory === '手錶/配件') return p.type === 'watch' || p.type === 'audio';
          return p.brand === activeCategory && p.type === 'phone';
        });
      };

      const filterHidden = p => !hiddenStaticProducts.includes(p.isStatic ? p.originalId : p.id);
      
      const backendDisplayList = getFilteredProducts().filter(filterHidden);
      const displayProducts = getFilteredProducts().filter(filterHidden);

      // ==========================================
      // 後台繪圖模組 
      // ==========================================
      const drawFlagship = () => {
        const canvas = canvas1Ref.current;
        if (!canvas || systemView !== 'backend') return;
        const ctx = canvas.getContext('2d');
        const size = 600;
        canvas.width = size; canvas.height = size;
        
        const theme = getBrandTheme(inputBrand);

        ctx.fillStyle = theme.bg; 
        ctx.fillRect(0, 0, size, size);

        ctx.strokeStyle = theme.frame;
        ctx.lineWidth = 1;
        ctx.strokeRect(15, 15, size - 30, size - 30);

        ctx.save();
        ctx.fillStyle = theme.bgText; 
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const bgText = (modelName || "PRO").toUpperCase();
        
        let fontSize = 110;
        ctx.font = `bold ${fontSize}px 'Arial Black', sans-serif`;
        while (ctx.measureText(bgText).width > size - 60 && fontSize > 40) {
          fontSize -= 5;
          ctx.font = `bold ${fontSize}px 'Arial Black', sans-serif`;
        }
        ctx.fillText(bgText, size/2, size/2);
        ctx.restore();

        if (officialImg) {
          const gap = 38; 
          const startY = 60;
          const topUIBottom = startY + 24;
          const topBoundary = topUIBottom + gap; 
          const bottomUITop = size - 65; 
          const bottomBoundary = bottomUITop - gap; 
          const leftBoundary = gap;
          const rightBoundary = size - gap;
          const maxW = rightBoundary - leftBoundary;
          const maxH = bottomBoundary - topBoundary;

          const scale = Math.min(maxW / officialImg.width, maxH / officialImg.height);
          const dw = officialImg.width * scale;
          const dh = officialImg.height * scale;
          const x = leftBoundary + (maxW - dw) / 2;
          const y = topBoundary + (maxH - dh) / 2;

          ctx.save();
          ctx.beginPath();
          ctx.ellipse(size / 2, y + dh - 5, dw * 0.38, 12, 0, 0, Math.PI * 2);
          ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
          ctx.shadowBlur = 25;
          ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
          ctx.fill();
          ctx.restore();

          ctx.drawImage(officialImg, x, y, dw, dh);
        } else {
          ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fillRect(150, 150, 300, 300);
          ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.font = "18px 'Microsoft JhengHei'"; ctx.textAlign = "center";
          ctx.fillText("請上傳商品照片", size/2, size/2);
        }

        ctx.save();
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
        const startX = 35, startY = 60;
        const logoSize = 32;
        let textOffset = 0;

        const tintLogo = (img, imgX, imgY, w, h) => {
          const offCanvas = document.createElement('canvas'); offCanvas.width = w; offCanvas.height = h;
          const octx = offCanvas.getContext('2d'); octx.drawImage(img, 0, 0, w, h);
          octx.globalCompositeOperation = 'source-in'; octx.fillStyle = theme.text; octx.fillRect(0,0,w,h);
          ctx.drawImage(offCanvas, imgX, imgY, w, h);
        };

        if (inputBrand === 'Apple' && brandLogoImgs.apple) {
          tintLogo(brandLogoImgs.apple, startX, startY - 26, logoSize, logoSize);
          textOffset = logoSize + 12;
        } else if (inputBrand === 'Samsung' && brandLogoImgs.samsung) {
          tintLogo(brandLogoImgs.samsung, startX, startY - 26, logoSize * 1.8, logoSize);
          textOffset = (logoSize * 1.8) + 12;
        }
        
        ctx.fillStyle = theme.text;
        ctx.font = "bold 28px 'Microsoft JhengHei', sans-serif";
        ctx.fillText((modelName || '產品型號').toUpperCase(), startX + textOffset, startY);

        if (deviceColor) {
          ctx.font = "bold 13px 'Microsoft JhengHei', sans-serif";
          const colorTextW = ctx.measureText(deviceColor).width + 20;
          const colorStartY = startY + 12;

          ctx.beginPath();
          ctx.roundRect ? ctx.roundRect(startX + textOffset, colorStartY, colorTextW, 24, 6) : ctx.rect(startX + textOffset, colorStartY, colorTextW, 24); 
          ctx.fillStyle = "rgba(228, 194, 113, 0.2)"; 
          ctx.fill();
          ctx.strokeStyle = "rgba(228, 194, 113, 0.8)"; 
          ctx.lineWidth = 1;
          ctx.stroke();

          ctx.fillStyle = theme.text; 
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(deviceColor, startX + textOffset + colorTextW / 2, colorStartY + 12);
        }
        ctx.restore();

        if (brandLogoImgs.quanzhan) {
          const logoW = 210; 
          const logoH = 210 * (120 / 450); 
          ctx.drawImage(brandLogoImgs.quanzhan, size - logoW - 8, size - logoH - 25, logoW, logoH);
        }

        ctx.save();
        ctx.textAlign = "left";
        ctx.fillStyle = theme.text;
        ctx.font = "bold 15px 'Microsoft JhengHei', sans-serif";
        ctx.fillText("銓展通訊 | 桃園市龜山區中興路 402 號", 25, size - 45);
        ctx.fillStyle = "#E4C271";
        ctx.font = "bold 13px Arial";
        ctx.fillText("SINCE 1989 | 統編：80089553 | 電話：03-3590858", 25, size - 22);
        ctx.restore();
      };

      const drawEngineeringDiagram = () => {
        const canvas = canvas2Ref.current;
        if (!canvas || systemView !== 'backend') return;
        const ctx = canvas.getContext('2d');
        const size = 600;
        canvas.width = size; canvas.height = size;
        const template = getDeviceTemplate(modelName);
        const isIphone = template.includes('iphone');
        const isUltra = template === 'samsung-ultra';
        const isSamsung = template.includes('samsung');

        ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, size, size);
        
        ctx.strokeStyle = "rgba(0, 0, 0, 0.04)"; ctx.lineWidth = 1;
        ctx.strokeRect(15, 15, size - 30, size - 30);

        const goldColor = "#E4C271"; 
        const mainColor = "#121619"; 

        ctx.save();
        ctx.textAlign = "center";
        const logoSize = 38; 
        let textOffset = 0;
        if (isIphone && brandLogoImgs.apple) {
          ctx.drawImage(brandLogoImgs.apple, size/2 - 145, 30, logoSize, logoSize);
          textOffset = 15;
        } else if (isSamsung && brandLogoImgs.samsung) {
          ctx.drawImage(brandLogoImgs.samsung, size/2 - 175, 30, logoSize * 1.8, logoSize);
          textOffset = 30;
        }
        ctx.fillStyle = mainColor; 
        ctx.font = "bold 34px 'Courier New', sans-serif"; 
        ctx.fillText((modelName || 'TECHNICAL BLUEPRINT').toUpperCase(), size/2 + textOffset, 65);
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = goldColor; 
        ctx.fillStyle = mainColor; 
        ctx.translate(0, 125); 
        ctx.scale(1.3, 1.3);
        ctx.lineWidth = 1.15; 

        const phoneW = 96, phoneH = 200, startY = 0;
        const borderRadius = isUltra ? 4 : 14;

        const drawLens = (x, y, r) => {
          ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath(); ctx.arc(x, y, r * 0.5, 0, Math.PI * 2); ctx.stroke();
        };

        const drawButton = (x, y, w, h, label, symbol) => {
            ctx.save();
            ctx.beginPath(); 
            ctx.roundRect ? ctx.roundRect(x, y, w, h, 1.5) : ctx.rect(x, y, w, h); 
            ctx.fillStyle = "#FFFFFF"; ctx.fill(); ctx.stroke();
            ctx.fillStyle = goldColor; ctx.font = "bold 8px Arial"; ctx.textAlign = "center";
            ctx.fillText(symbol, x + w/2, y + h/2 + 3);
            ctx.font = "bold 9px 'Microsoft JhengHei'"; ctx.fillStyle = mainColor;
            ctx.fillText(label, w < 0 ? x-22 : x+w+22, y + h/2 + 3); 
            ctx.restore();
        };
        
        const tFront = 48, tBack = 188, tSideL = 338, tSideR = 398;

        ctx.save(); ctx.translate(tFront, startY);
        ctx.beginPath(); ctx.roundRect ? ctx.roundRect(0, 0, phoneW, phoneH, borderRadius) : ctx.rect(0, 0, phoneW, phoneH); ctx.stroke();
        ctx.beginPath(); ctx.roundRect ? ctx.roundRect(4, 4, phoneW-8, phoneH-8, Math.max(0, borderRadius-2)) : ctx.rect(4, 4, phoneW-8, phoneH-8); ctx.stroke();
        
        ctx.save();
        ctx.strokeStyle = "rgba(228, 194, 113, 0.2)"; 
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(4, 4); ctx.lineTo(phoneW-4, phoneH-4);
        ctx.moveTo(phoneW-4, 4); ctx.lineTo(4, phoneH-4);
        ctx.stroke();
        
        ctx.beginPath(); ctx.arc(phoneW/2, phoneH/2, 12, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)"; ctx.fill(); ctx.stroke();
        ctx.fillStyle = mainColor;
        ctx.font = "bold 6px 'Arial'"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("DISPLAY", phoneW/2, phoneH/2);
        ctx.restore();

        if (isSamsung) {
            ctx.beginPath(); ctx.moveTo(phoneW/2 - 10, 6); ctx.lineTo(phoneW/2 + 10, 6); ctx.stroke();
            ctx.beginPath(); ctx.arc(phoneW/2, 16, 3, 0, Math.PI * 2); ctx.fill();
            ctx.save();
            ctx.strokeStyle = "rgba(228, 194, 113, 0.5)"; ctx.setLineDash([2, 2]);
            ctx.beginPath(); ctx.arc(phoneW/2, phoneH - 35, 10, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();
        } else {
            ctx.beginPath(); ctx.roundRect ? ctx.roundRect(phoneW/2-22, 10, 44, 12, 6) : ctx.rect(phoneW/2-22, 10, 44, 12); ctx.fill(); ctx.stroke();
            ctx.save(); ctx.fillStyle = "#FFFFFF";
            ctx.beginPath(); ctx.arc(phoneW/2 + 12, 16, 2, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            ctx.beginPath(); ctx.roundRect ? ctx.roundRect(phoneW/2 - 25, phoneH - 10, 50, 2, 1) : ctx.rect(phoneW/2 - 25, phoneH - 10, 50, 2); ctx.fill();
        }
        ctx.textAlign = "center"; ctx.font = "bold 12px 'Microsoft JhengHei'"; ctx.fillText("正面視圖", phoneW/2, phoneH + 25);
        ctx.restore();

        ctx.save(); ctx.translate(tBack, startY);
        ctx.beginPath(); ctx.roundRect ? ctx.roundRect(0, 0, phoneW, phoneH, borderRadius) : ctx.rect(0, 0, phoneW, phoneH); ctx.stroke();
        if (!isSamsung) { ctx.beginPath(); ctx.roundRect ? ctx.roundRect(8, 8, 46, 46, 10) : ctx.rect(8, 8, 46, 46); ctx.stroke(); }
        if (template === 'iphone-pro') { drawLens(22, 22, 10); drawLens(22, 44, 10); drawLens(44, 33, 10); }
        else if (template === 'iphone-std') { drawLens(31, 22, 11); drawLens(31, 44, 11); }
        else if (template === 'samsung-ultra') { drawLens(24, 25, 9); drawLens(24, 50, 9); drawLens(24, 75, 9); drawLens(50, 60, 6); }
        else { drawLens(26, 25, 8); drawLens(26, 50, 8); drawLens(26, 75, 8); }
        
        ctx.globalAlpha = 0.5;
        if (isSamsung && brandLogoImgs.samsung) { ctx.drawImage(brandLogoImgs.samsung, phoneW/2-20, phoneH/2, 40, 20); }
        else if (brandLogoImgs.apple) { ctx.drawImage(brandLogoImgs.apple, phoneW/2-10, phoneH/2-12, 20, 26); }
        ctx.globalAlpha = 1.0;
        ctx.textAlign = "center"; ctx.font = "bold 12px 'Microsoft JhengHei'"; ctx.fillText("背面視圖", phoneW/2, phoneH + 25);
        ctx.restore();

        const sideW = 14;
        ctx.save(); ctx.translate(tSideL, startY);
        ctx.beginPath(); ctx.roundRect ? ctx.roundRect(0, 0, sideW, phoneH, 7) : ctx.rect(0, 0, sideW, phoneH); ctx.stroke();
        if (isIphone) {
            drawButton(0, 35, -3, 12, "動作鍵", "★");
            drawButton(0, 60, -3, 22, "音量+", "+");
            drawButton(0, 88, -3, 22, "音量-", "-");
        }
        ctx.textAlign = "center"; ctx.font = "bold 12px 'Microsoft JhengHei'"; ctx.fillText("左側視圖", sideW/2, phoneH + 25);
        ctx.restore();

        ctx.save(); ctx.translate(tSideR, startY);
        ctx.beginPath(); ctx.roundRect ? ctx.roundRect(0, 0, sideW, phoneH, 7) : ctx.rect(0, 0, sideW, phoneH); ctx.stroke();
        if (isIphone) {
            drawButton(sideW, 70, 3, 30, "電源鍵", "⟳");
            drawButton(sideW, 130, 3, 30, "相機控制", "📷");
        } else {
            drawButton(sideW, 55, 3, 40, "音量鍵", "±");
            drawButton(sideW, 105, 3, 25, "電源鍵", "⟳");
        }
        ctx.beginPath(); ctx.roundRect ? ctx.roundRect(-4, 10, 4, 60, 2) : ctx.rect(-4, 10, 4, 60); ctx.stroke();
        ctx.textAlign = "center"; ctx.font = "bold 12px 'Microsoft JhengHei'"; ctx.fillText("右側視圖", sideW/2, phoneH + 25);
        ctx.restore();
        
        ctx.restore();

        ctx.save();
        ctx.textAlign = "center";
        ctx.fillStyle = mainColor;
        ctx.font = "bold 20px 'Microsoft JhengHei', sans-serif";
        ctx.fillText("全商品技術工程圖集 | 產品技術規格圖解", size/2, size - 75);
        
        ctx.fillStyle = goldColor;
        ctx.font = "bold 14px 'Microsoft JhengHei', sans-serif";
        ctx.fillText("店名：銓展通訊 | 地址：桃園市龜山區中興路 402 號", size/2, size - 42);
        ctx.font = "12px Arial";
        ctx.fillText("SINCE 1989 | 統編：80089553 | 電話：03-3590858", size/2, size - 20);
        ctx.restore();
      };

      useEffect(() => {
        drawFlagship();
        drawEngineeringDiagram();
      }, [officialImg, modelName, deviceColor, inputBrand, systemView]);

      const getBrandBtnClass = (catName, isActive) => {
        const base = "px-4 py-1.5 text-xs md:text-sm border transition rounded-full font-bold tracking-wider whitespace-nowrap";
        if (!isActive) return `${base} border-slate-600 text-slate-400 bg-transparent hover:border-slate-400 hover:text-slate-200`;
        switch (catName) {
          case 'New': return `${base} border-yellow-500 text-yellow-900 bg-gradient-to-b from-yellow-300 to-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.4)] animate-pulse`;
          case 'Apple': return `${base} border-slate-400 text-slate-900 bg-gradient-to-b from-gray-200 to-gray-400 shadow-[0_0_10px_rgba(255,255,255,0.2)]`;
          case 'Samsung': return `${base} border-blue-500 text-white bg-gradient-to-b from-blue-500 to-blue-700 shadow-[0_0_10px_rgba(59,130,246,0.5)]`;
          case 'OPPO': return `${base} border-emerald-500 text-white bg-gradient-to-b from-emerald-500 to-emerald-700 shadow-[0_0_10px_rgba(16,185,129,0.5)]`;
          case 'vivo': return `${base} border-indigo-500 text-white bg-gradient-to-b from-indigo-500 to-indigo-700 shadow-[0_0_10px_rgba(99,102,241,0.5)]`;
          case '小米': return `${base} border-orange-500 text-white bg-gradient-to-b from-orange-500 to-orange-700 shadow-[0_0_10px_rgba(249,115,22,0.5)]`;
          default: return `${base} border-slate-400 text-white bg-gradient-to-b from-slate-600 to-slate-800 shadow-[0_0_10px_rgba(255,255,255,0.2)]`;
        }
      };

      const titaniumTextLight = "text-transparent bg-clip-text bg-gradient-to-b from-white via-gray-200 to-gray-400";
      const pencilText = "text-slate-400 font-light tracking-wide";

      return (
        <div className={`min-h-screen ${systemView === 'frontend' ? 'bg-[#0f172a] text-slate-300' : 'bg-slate-50 text-slate-900'} flex flex-col font-sans relative transition-colors duration-500 pb-24`}>
          
          {/* Toast 提示元件 */}
          {toast.show && (
            <div className={`fixed top-6 right-6 z-[999] flex items-center p-4 mb-4 text-sm rounded-lg shadow-xl transform transition-all duration-300 animate-in slide-in-from-top-4 ${
              toast.type === 'error' ? 'bg-red-100 text-red-800 border border-red-200' : 
              toast.type === 'success' ? 'bg-green-100 text-green-800 border border-green-200' : 
              'bg-blue-100 text-blue-800 border border-blue-200'
            }`}>
              {toast.type === 'error' ? <AlertCircle className="w-5 h-5 mr-2" /> : <CheckCircle className="w-5 h-5 mr-2" />}
              <span className="font-bold tracking-wide">{toast.msg}</span>
            </div>
          )}

          {/* ================= 前台 / 後台 全域浮動切換器 ================= */}
          <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[999]">
            <div className="bg-black/40 backdrop-blur-xl p-1.5 rounded-full shadow-2xl border border-white/20 inline-flex flex-row items-center gap-1">
              <button
                onClick={() => {
                  setSystemView('frontend');
                  showToast("已切換至 數位門市 (前台模式)", "success");
                }}
                className={`px-5 py-2.5 rounded-full text-sm font-black transition-all duration-300 flex items-center gap-2 ${systemView === 'frontend' ? 'bg-gradient-to-r from-blue-500 to-indigo-600 text-white shadow-lg scale-105' : 'text-slate-300 hover:bg-white/10'}`}
              >
                <Store size={18} /> 數位門市前台
              </button>
              <div className="w-[1px] h-6 bg-white/20 mx-1"></div>
              <button
                onClick={() => {
                  setSystemView('backend');
                  showToast("已切換至 自動上架中樞 (後台模式)", "success");
                }}
                className={`px-5 py-2.5 rounded-full text-sm font-black transition-all duration-300 flex items-center gap-2 ${systemView === 'backend' ? 'bg-gradient-to-r from-emerald-500 to-teal-600 text-white shadow-lg scale-105' : 'text-slate-300 hover:bg-white/10'}`}
              >
                <Database size={18} /> 自動上架後台
              </button>
            </div>
          </div>

          {systemView === 'frontend' ? (
            /* ================= 數位門市 (前台視圖) ================= */
            <>
              <div className="fixed inset-0 z-0 pointer-events-none opacity-[0.03]" 
                   style={{ backgroundImage: 'linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)', backgroundSize: '30px 30px' }}>
              </div>

              <nav className="bg-[#0f172a]/95 backdrop-blur-md border-b border-slate-700 sticky top-0 z-40">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between h-20">
                    <div className="flex items-center gap-4">
                      <div className="w-12 h-12 flex items-center justify-center">
                         <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-lg">
                            <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#gradLogo)" stroke="#94a3b8" strokeWidth="2" />
                            <defs>
                              <linearGradient id="gradLogo" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stopColor="#1e293b" />
                                <stop offset="100%" stopColor="#0f172a" />
                              </linearGradient>
                            </defs>
                            <path d="M 30 30 L 70 30 L 70 70 L 30 70 Z" fill="none" stroke="#e2e8f0" strokeWidth="6" rx="5" />
                            <path d="M 50 20 L 50 40" stroke="#3b82f6" strokeWidth="6" strokeLinecap="round" />
                            <path d="M 20 50 L 40 50" stroke="#3b82f6" strokeWidth="6" strokeLinecap="round" />
                            <path d="M 60 60 L 80 80" stroke="#e2e8f0" strokeWidth="8" strokeLinecap="round" />
                            <circle cx="50" cy="50" r="8" fill="#3b82f6" />
                         </svg>
                      </div>

                      <div className="flex flex-col justify-center mt-0.5">
                        <h1 className={`text-xl md:text-2xl font-black tracking-[0.2em] ${titaniumTextLight} leading-none mb-1.5 flex items-center gap-3`}>
                          {companyInfo.name}
                          <RealTimeStatus />
                        </h1>
                        <span className={`text-[10px] md:text-[11px] font-medium ${pencilText} italic tracking-[0.2em] leading-none`}>
                          {companyInfo.slogan}
                        </span>
                      </div>
                    </div>
                    
                    <div className="hidden md:grid grid-cols-3 gap-x-2 gap-y-1.5 ml-auto mr-6 items-center content-center">
                       {['商品鏡頭列表', '商品明細列表', '商品比較列表', '門號申辦', '無卡分期', '好物推薦'].map((btn) => (
                          <button 
                            key={btn} 
                            onClick={() => setFrontendActiveView(btn)}
                            className={`px-2.5 py-1 border text-[10px] lg:text-[11px] font-bold rounded transition tracking-widest flex items-center justify-center whitespace-nowrap shadow-sm ${
                               frontendActiveView === btn
                                 ? 'bg-slate-200 text-slate-900 border-white shadow-[0_0_10px_rgba(255,255,255,0.3)]'
                                 : 'bg-transparent border-slate-500/80 text-slate-300 hover:bg-slate-700 hover:border-slate-300 hover:text-white'
                            }`}
                          >
                             {btn}
                          </button>
                       ))}
                    </div>

                     <div className="flex items-center md:hidden">
                      <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="text-slate-400 hover:text-white">
                        {isMenuOpen ? <X size={28} /> : <Menu size={28} />}
                      </button>
                    </div>
                  </div>
                </div>
              </nav>

              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 relative z-10">
                <div className="mb-8 border-b border-slate-800 pb-6 flex flex-col md:flex-row justify-between items-start gap-6">
                     <div className="flex flex-col gap-2.5 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
                        <div className="flex gap-1.5 min-w-max">
                           {brandCategories.map((cat) => (
                             <button 
                               key={cat.name} 
                               onClick={() => setActiveCategory(cat.name)}
                               className={getBrandBtnClass(cat.name, activeCategory === cat.name)}
                             >
                               {cat.label}
                             </button>
                           ))}
                        </div>
                        <div className="flex gap-1.5 min-w-max">
                           {typeCategories.map((cat) => (
                             <button 
                               key={cat.name} 
                               onClick={() => setActiveCategory(cat.name)}
                               className={getBrandBtnClass(cat.name, activeCategory === cat.name)}
                             >
                               {cat.label}
                             </button>
                           ))}
                        </div>
                     </div>
                     
                     <div className="flex flex-col items-start md:items-end md:ml-auto mt-0">
                        <h2 className={`text-2xl md:text-3xl font-black ${titaniumTextLight} tracking-[0.3em] leading-none`}>
                           旗艦規格
                        </h2>
                        <h2 className={`text-2xl md:text-3xl font-black text-slate-500 tracking-[0.3em] leading-none`}>
                           破盤價格
                        </h2>
                     </div>
                </div>

                {frontendActiveView === '商品鏡頭列表' ? (
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 animate-in fade-in duration-500">
                      {displayProducts.length === 0 && activeCategory === 'New' && (
                          <div className="col-span-full py-24 flex flex-col items-center justify-center text-slate-500 border-2 border-dashed border-slate-700 rounded-2xl bg-[#1e293b]/50">
                             <Zap size={48} className="mb-4 opacity-50 text-yellow-500" />
                             <h3 className="text-xl font-bold text-slate-300 mb-2">最新上架區準備中</h3>
                             <p className="text-sm tracking-widest font-mono">老闆即將上架最新旗艦商品，敬請期待！</p>
                          </div>
                      )}
                      {displayProducts.map((product) => (
                        <div key={product.id} className="bg-[#e2e8f0]/95 p-5 md:p-6 rounded-2xl border-2 border-white/20 relative overflow-hidden shadow-2xl flex flex-col sm:flex-row items-stretch min-h-[250px] transition-all duration-300 group hover:border-[#E4C271]">
                            <div className="sm:w-[40%] z-10 sm:pr-4 flex flex-col justify-between mb-6 sm:mb-0 shrink-0">
                                <div>
                                    <h3 className="text-2xl font-bold leading-tight mb-1 text-slate-900">
                                        {product.title}
                                    </h3>
                                    <p className="text-[11px] text-slate-600 font-mono mb-4 border-b border-slate-300 pb-3 inline-block">{product.launch}</p>
                                    
                                    <ul className="text-xs space-y-2.5 mb-6 text-slate-700 font-bold list-none">
                                        {product.features?.map((feature, idx) => (
                                          <li key={idx} className="flex items-start gap-2">
                                             <span className="text-slate-400 mt-[2px]">•</span>
                                             <span className="leading-tight tracking-wide">{feature}</span>
                                          </li>
                                        ))}
                                    </ul>
                                </div>
                                <button 
                                   onClick={() => setSelectedProduct(product)}
                                   className="self-start px-6 py-1.5 bg-transparent border border-slate-800 text-slate-900 text-xs font-black rounded-full hover:bg-slate-800 hover:text-white transition-all shadow-sm flex items-center gap-2"
                                >
                                    <span>進入商品明細表</span>
                                </button>
                            </div>

                            <div className="sm:w-[60%] flex flex-col items-center justify-center relative sm:border-l border-slate-300 sm:pl-4 pt-6 sm:pt-0 border-t sm:border-t-0 border-dashed sm:border-solid overflow-hidden bg-slate-100 rounded-xl shadow-inner p-4">
                                <div className="w-full h-full min-h-[160px] border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center bg-white/50 relative overflow-hidden group/blueprint">
                                   {product.isFromBackend && product.lensListImage ? (
                                       <img src={product.lensListImage} alt="技術藍圖" className="w-full h-full object-contain mix-blend-multiply drop-shadow-xl transform group-hover/blueprint:scale-110 transition-transform duration-500 p-2" />
                                   ) : (
                                       <div className="relative w-full h-full flex items-center justify-center scale-110 transform group-hover/blueprint:scale-125 transition-transform duration-500 drop-shadow-xl p-4">
                                           <DynamicBlueprint title={product.title} type={product.type} />
                                       </div>
                                   )}
                                </div>
                            </div>
                            
                            <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#94a3b8 1px, transparent 1px)', backgroundSize: '15px 15px' }}></div>
                        </div>
                      ))}
                    </div>
                ) : frontendActiveView === '商品明細列表' ? (
                    <div className="bg-[#1e293b]/80 rounded-xl border border-slate-600 shadow-2xl overflow-hidden animate-in slide-in-from-bottom-4 duration-500">
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left whitespace-nowrap">
                                <thead className="text-xs text-slate-400 uppercase bg-slate-800/80 border-b border-slate-600 tracking-widest">
                                    <tr>
                                        <th className="px-5 py-4 font-bold">型號 / 上市時間</th>
                                        <th className="px-5 py-4 font-bold">材質 + 尺寸 + 電池</th>
                                        <th className="px-5 py-4 font-bold">相機鏡頭 (後 / 前)</th>
                                        <th className="px-5 py-4 font-bold">機身顏色</th>
                                        <th className="px-5 py-4 font-bold text-blue-400">銓展破盤價</th>
                                        <th className="px-5 py-4 font-bold">PS (附註)</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700/50">
                                    {displayProducts.map((p) => {
                                        const sPrices = p.specs['銓展價']?.split(' / ') || [];
                                        
                                        return (
                                        <tr 
                                            key={p.id} 
                                            onClick={() => setSelectedProduct(p)}
                                            className="hover:bg-slate-700/60 transition-colors group cursor-pointer"
                                            title="點擊查看完整圖文明細"
                                        >
                                            <td className="px-5 py-4 align-top">
                                                <div className="font-bold text-slate-100 text-base mb-1 group-hover:text-blue-300 transition-colors whitespace-nowrap">
                                                    {p.title}
                                                </div>

                    {/* 後台分類標籤 */}
                    <div className="flex gap-2 mb-6 overflow-x-auto pb-2 border-b border-slate-100/50">
                      {brandCategories.filter(c => c.name !== 'New').map(cat => (
                        <button
                          key={`backend-${cat.name}`}
                          onClick={() => setBackendCategory(cat.name)}
                          className={`px-4 py-1.5 text-xs font-bold rounded-full transition whitespace-nowrap ${backendCategory === cat.name ? 'bg-[#001F3F] text-[#E4C271] shadow-md' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                        >
                          {cat.label}
                        </button>
                      ))}
                      {typeCategories.map(cat => (
                        <button
                          key={`backend-${cat.name}`}
                          onClick={() => setBackendCategory(cat.name)}
                          className={`px-4 py-1.5 text-xs font-bold rounded-full transition whitespace-nowrap ${backendCategory === cat.name ? 'bg-[#001F3F] text-[#E4C271] shadow-md' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                        >
                          {cat.label}
                        </button>
                      ))}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      {backendDisplayList.length === 0 && (
                        <div className="col-span-full py-12 flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50">
                           <LayoutList size={48} className="mb-3 opacity-20" />
                           <p className="text-sm font-bold tracking-widest">該分類目前無商品。</p>
                        </div>
                      )}
                      {backendDisplayList.map((item) => (
                        <div key={`db-${item.id}`} className="border border-slate-200 rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 bg-white flex flex-col relative group">
                          
                          {/* 一鍵載入規格重新製作 */}
                          <button 
                            onClick={() => loadProductToForm(item)}
                            className="absolute top-2 right-2 bg-blue-500 text-white text-[10px] font-bold px-2 py-1 rounded shadow-md z-20 hover:bg-blue-600 transition flex items-center gap-1"
                          >
                             <RefreshCw size={10} /> 載入並重製圖片
                          </button>

                          <div className="bg-gradient-to-r from-slate-800 to-slate-900 text-white p-3 text-left font-bold text-sm tracking-wide relative pr-24 flex flex-col gap-1">
                            <div>
                              {item.model || item.title} 
                              {item.isStatic && <span className="ml-2 bg-blue-500/80 text-white text-[9px] px-1.5 py-0.5 rounded shadow-sm align-middle">內建</span>}
                            </div>
                            <div className="text-[#E4C271] font-normal text-[10px] leading-tight break-words pr-2">
                               {item.color || item.specs?.['機身顏色'] ? `(${item.color || item.specs?.['機身顏色']})` : ''}
                            </div>
                          </div>
                          
                          <div className="flex w-full divide-x divide-slate-100 bg-slate-50 p-2 gap-2 h-32">
                            <div className="w-1/2 flex flex-col relative group/img h-full">
                              <div className="absolute top-1 left-1 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded backdrop-blur-sm z-10">明細專用圖</div>
                              {item.isStatic ? (
                                  <div className="w-full h-full flex items-center justify-center bg-slate-100 relative overflow-hidden border border-slate-200 rounded-lg p-2">
                                     <DynamicFlagshipCard product={item} />
                                  </div>
                              ) : (
                                  <img src={item.detailListImage} alt="明細列表圖" className="w-full h-full object-contain rounded-lg border border-slate-200 bg-white shadow-sm transition-transform group-hover/img:scale-105" />
                              )}
                            </div>
                            <div className="w-1/2 flex flex-col relative group/img h-full">
                              <div className="absolute top-1 left-1 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded backdrop-blur-sm z-10">規格藍圖</div>
                              {item.isStatic ? (
                                  <div className="w-full h-full flex items-center justify-center bg-slate-100 overflow-hidden relative border border-slate-200 rounded-lg">
                                     <div className="w-[150%] h-[150%] transform scale-90 flex items-center justify-center">
                                         <DynamicBlueprint title={item.title} type={item.type} />
                                     </div>
                                  </div>
                              ) : (
                                  <img src={item.lensListImage} alt="鏡頭列表圖" className="w-full h-full object-contain rounded-lg border border-slate-200 bg-white shadow-sm transition-transform group-hover/img:scale-105" />
                              )}
                            </div>
                          </div>
                          
                          <div className="p-3 text-[11px] text-slate-600 bg-slate-50 border-t border-slate-100 flex flex-col gap-1.5 h-auto max-h-32 overflow-y-auto">
                             <div className="flex flex-col gap-0.5 border-t border-slate-200 pt-1">
                                 <span className="font-bold text-blue-500 mb-0.5">破盤價</span>
                                 {(() => {
                                     const sPrices = item.specs?.['銓展價']?.split(' / ') || [];
                                     return sPrices.map((p, i) => (
                                         <div key={`sp-${i}`} className="text-blue-600 font-bold truncate pl-1">
                                             {formatCombinedPrice(p)}
                                         </div>
                                     ));
                                 })()}
                             </div>
                          </div>

                          <div className="p-3 text-[11px] text-slate-500 flex justify-between items-center bg-slate-100 border-t border-slate-200">
                            <span className="font-mono text-[9px] truncate max-w-[100px]">{item.isStatic ? '系統內建資料' : item.imageFormat}</span>
                            <button onClick={() => {
                                if (item.isStatic) {
                                    setHiddenStaticProducts(prev => [...prev, item.originalId]);
                                    showToast("內建商品已從畫面隱藏。", "success");
                                } else {
                                    deleteEntry(item.id);
                                }
                            }} className="px-3 py-1.5 bg-white border border-red-200 text-red-600 rounded-lg font-bold hover:bg-red-500 hover:text-white hover:border-red-500 transition shadow-sm flex items-center gap-1">
                              <Trash2 size={12}/> {item.isStatic ? '隱藏商品' : '刪除下架'}
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
          
          {/* ================= 頁尾 ================= */}
          <footer className={`py-6 text-center text-xs flex flex-col items-center gap-1.5 font-medium tracking-wide ${systemView === 'frontend' ? 'bg-[#0B1120] text-slate-500 border-t border-slate-800 relative z-10 mt-auto' : 'bg-slate-50 text-slate-400 mt-auto'}`}>
            <div className={`w-12 h-1 rounded-full mb-2 ${systemView === 'frontend' ? 'bg-slate-700' : 'bg-slate-300'}`}></div>
            <p className={`font-bold ${systemView === 'frontend' ? 'text-slate-400' : 'text-slate-500'}`}>店名：銓展通訊 | 地址：桃園市龜山區中興路 402 號</p>
            <p>統編：80089553 | 電話：<a href="tel:033590858" target="_top" className="hover:text-blue-400 hover:underline transition-colors cursor-pointer">03-3590858</a></p>
            <p className={`text-[10px] mt-1 ${systemView === 'frontend' ? 'text-slate-600' : 'text-slate-300'}`}>© {new Date().getFullYear()} Quanzhan Communication. All rights reserved.</p>
          </footer>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
